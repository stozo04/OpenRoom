app_id: 8
app_name: album
app_display_name: Album
version: "1.0.0"
description: >
  Kayley's selfie album — 542 photos of her in different outfits, locations, and moods
  (Austin apartment, couch, date nights, daily check-ins). The character can browse,
  filter mentally by date or location, and reference specific photos in conversation.
  Read-only; supports REFRESH to re-sync after the Agent adds/removes images.
displayDesc: >
  Kayley's selfie album — 542 photos across outfits, locations, and moods. Grid view with full-size preview on click.

# ============================================================
# The following actions are only for Agent → Frontend command dispatch.
# After the Agent adds/deletes image files on the cloud, it can dispatch REFRESH to notify the frontend to re-sync.
# ============================================================

actions:
  - type: REFRESH
    name: Refresh Album
    description: >
      After the Agent has added or deleted image files on the cloud, this action is dispatched to notify the frontend to re-sync and refresh the list.
      Upon receiving it, the frontend calls initFromCloud and reloads all image metadata under /images.
    params: []
