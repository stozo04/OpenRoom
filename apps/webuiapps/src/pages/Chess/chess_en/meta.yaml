app_id: 12
app_name: chess
app_display_name: Chess
version: "1.0.0"
description: >
  Chess game app. User plays white, Agent plays black, strict turn-based. Game state stored in state.json.
  Full rules supported: castling, en passant, pawn promotion, check/checkmate/stalemate detection.
  Supports AGENT_MOVE/SYNC_STATE/NEW_GAME actions.
  This file only defines actions dispatched from Agent to frontend. User local operations are handled and reported by frontend code.
displayDesc: >
  Classic chess — engage in strategic battles against AI. Full rules including castling, en passant, and pawn promotion.

# ============================================================
# The following actions are only for Agent → Frontend command dispatch.
# Before dispatching these actions, the Agent should have already completed
# writes/modifications to the cloud state.json.
# The purpose of dispatching actions is to notify the frontend to sync the latest data and refresh the UI.
# ============================================================

actions:
  - type: AGENT_MOVE
    name: Agent Move
    description: >
      The Agent has applied its move in state.json on the cloud (updated board, set currentTurn to "w",
      set isAgentThinking to false, appended to moveHistory, updated gameStatus, etc.).
      This action is dispatched to notify the frontend to read the latest state from the cloud
      and refresh the UI, unlocking the board for the user to continue.
    params:
      - name: filePath
        type: string
        description: The state file path written by the Agent, fixed as /state.json
        required: true
      - name: from
        type: string
        description: The Agent's move source coordinate, e.g., "e7"
        required: false
      - name: to
        type: string
        description: The Agent's move target coordinate, e.g., "e5"
        required: false

  - type: SYNC_STATE
    name: Sync State
    description: >
      The Agent has modified state.json on the cloud (e.g., adjusting game state, reverting moves, etc.).
      This action is dispatched to notify the frontend to read the latest state from the cloud and refresh the UI.
    params:
      - name: filePath
        type: string
        description: The state file path written by the Agent, fixed as /state.json
        required: true

  - type: NEW_GAME
    name: New Game
    description: >
      The Agent has written a new game's state.json on the cloud (containing complete initial board data).
      This action is dispatched to notify the frontend to read the new game and refresh the UI.
    params:
      - name: filePath
        type: string
        description: The state file path written by the Agent, fixed as /state.json
        required: true

  # ============================================================
  # Headless per-app actions — invoked by vibe_action from Kayley's brain.
  # These are handled directly by the dispatcher (vibeContainerMock.ts) using
  # a shared chess engine; the Chess window does not need to be open. When
  # the window IS open, a follow-up AGENT_MOVE / NEW_GAME / SYNC_STATE
  # notification refreshes the UI from disk.
  # ============================================================

  - type: START_GAME
    name: Start Game
    description: >
      Reset the board and start a new game. By convention Steven plays white, Kayley plays black.
      Returns { fen: string } with the starting position.
    params:
      - name: opponent
        type: string
        description: "'human' or 'kayley' — who Steven is playing against (informational)"
        required: false
      - name: difficulty
        type: string
        description: "'easy' | 'medium' | 'hard' (reserved, not yet used by the engine)"
        required: false

  - type: MAKE_MOVE
    name: Make Move
    description: >
      Play a move for the side-to-move. Validates the move against the engine's legal move list.
      Auto-promotes pawns to Queen. Returns { fen, last_move, turn, game_over? }.
    params:
      - name: from
        type: string
        description: Source square in algebraic notation (e.g., "e2")
        required: true
      - name: to
        type: string
        description: Target square in algebraic notation (e.g., "e4")
        required: true
      - name: promotion
        type: string
        description: "Promotion piece ('q'|'r'|'b'|'n') — optional; defaults to queen"
        required: false

  - type: GET_BOARD
    name: Get Board
    description: >
      Return the current game state without changing it.
      Response shape { fen: string, turn: 'w'|'b', legal_moves: string[] }.
    params: []

  - type: SURRENDER
    name: Surrender
    description: >
      Concede the current game. Called by Kayley (who plays black), so Steven wins.
      Returns { result: 'steven_won' }.
    params: []

  - type: HINT
    name: Hint
    description: >
      Return a suggested move for the current player using a simple heuristic
      (prefers checkmate, then highest-value capture, else a developing move).
      Response shape { suggested_move: string, reason: string }.
    params: []
